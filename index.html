<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vertex</title>
<meta name="description" content="Vertex — a tabletop RPG about who you are, who you are becoming, and what it costs to complete that transformation." />
<meta name="theme-color" content="#0a0d11" />

<!-- Favicons / app icons (relative paths: correct under the /vertex/ Pages subpath) -->
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
<link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png" />
<link rel="icon" href="assets/favicon.ico" sizes="any" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
<link rel="manifest" href="assets/site.webmanifest" />

<!-- Open Graph / social preview (absolute URLs: required by social scrapers) -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Vertex" />
<meta property="og:title" content="Vertex" />
<meta property="og:description" content="Who you are. Who you are becoming. What it costs." />
<meta property="og:url" content="https://ultimondo.github.io/vertex/" />
<meta property="og:image" content="https://ultimondo.github.io/vertex/assets/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Vertex" />
<meta name="twitter:description" content="Who you are. Who you are becoming. What it costs." />
<meta name="twitter:image" content="https://ultimondo.github.io/vertex/assets/twitter-image.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Cache-busted so a normal reload always gets the latest CSS (no hard-reload needed). -->
<script>document.write('<link rel="stylesheet" href="styles/app.css?v=' + Date.now() + '">');</script>
<noscript><link rel="stylesheet" href="styles/app.css"></noscript>
</head>
<body>

  <!-- ============ title bar + tabs ============ -->
  <div class="topbar">
    <a class="brand" href="landing.html" title="To the Vertex landing page">VERTEX</a>
    <nav class="tabs" id="tabs">
      <button class="active" data-tab="core" onclick="Vertex.app.setTab('core',this)">Core</button>
      <button data-tab="designation" onclick="Vertex.app.setTab('designation',this)">Designation</button>
      <button data-tab="gear" onclick="Vertex.app.setTab('gear',this)">Gear</button>
      <button data-tab="archetypes" onclick="Vertex.app.setTab('archetypes',this)">Archetypes</button>
      <button data-tab="bonds" onclick="Vertex.app.setTab('bonds',this)">Bonds</button>
    </nav>
    <div class="topctrl">
      <div class="switchwrap">
        <button class="btn" onclick="Vertex.app.toggleMenu(event)">Switch character ▾</button>
        <div class="menu" id="menu"></div>
      </div>
      <button class="btn" onclick="Vertex.create.open()">+ New</button>
    </div>
  </div>

  <!-- ============ page ============ -->
  <div class="page">
    <header class="idband">
      <div class="portrait" id="portrait" onclick="Vertex.app.choosePortrait()" title="Click to set the character image"></div>
      <div class="idtext">
        <h1 id="idName" contenteditable="true" spellcheck="false"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
            onblur="Vertex.app.editName(this.textContent)">Mara Quill</h1>
        <div class="desig">Designation: <b id="idDesig">the Blacksmith</b></div>
      </div>
      <button class="editbtn" style="margin-left:auto" onclick="Vertex.app.editSection('identity')" title="Edit identity">Edit</button>
    </header>

    <input type="file" id="portraitInput" accept="image/*" hidden onchange="Vertex.app.onPortraitFile(this.files[0])">
    <input type="file" id="importInput" accept="application/json,.json" hidden onchange="Vertex.app.onImportFile(this.files[0])">

    <main>
      <section class="tabpanel active" id="tab-core"></section>
      <section class="tabpanel" id="tab-archetypes"></section>
      <section class="tabpanel" id="tab-bonds"></section>
      <section class="tabpanel" id="tab-designation"></section>
      <section class="tabpanel" id="tab-gear"></section>
      <!-- Cast tab removed from the UI (2026-06-21); its engine + render code
           are preserved (Vertex.render.cast/castResult, Vertex.app.doCast,
           Vertex.dice) for reuse elsewhere. -->
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <div id="overlay"></div>

  <!-- ============ Google APIs (for "Load from Drive"; async, order-independent) ============ -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- ============ scripts (classic, ordered; no build step) ============
       Loaded via a tiny cache-busting loader so a NORMAL reload always runs the
       latest code. GitHub Pages otherwise lets the browser serve a stale cached
       copy of these files, which repeatedly showed old rules after a fix was
       already deployed. async=false preserves execution order (dice → … → drive). -->
  <script>
    (function () {
      var v = Date.now();
      ["data/seed.js", "src/dice.js", "src/model.js", "src/storage.js",
       "src/render.js", "src/create.js", "src/app.js", "src/drive.js"]
        .forEach(function (s) {
          var el = document.createElement("script");
          el.src = s + "?v=" + v;
          el.async = false;            // keep load/exec order
          document.head.appendChild(el);
        });
    })();
  </script>
</body>
</html>
